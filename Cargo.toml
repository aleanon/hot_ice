cargo-features = ["profile-rustflags"]

[workspace]
version = "0.1.0"
edition = "2021"
members = ["ui", "reloadable"]


[profile.dev]
rustflags = ["-C", "prefer-dynamic", "-Zmacro-backtrace"]
opt-level = 0
lto = false
codegen-units = 1
debug-assertions = true
debug = 1

[profile.dev.package."*"]
opt-level = 3
codegen-units = 1

[workspace.dependencies]
serde = { version = "*" }
no-mangle-if-debug = "0.1.0"
once_cell = "1.21.3"
bincode = { version = "1.3.3" }
iced = { git = "https://github.com/iced-rs/iced.git", branch = "master", default-features = false, features = [
    "wgpu",
    "tokio",
    "image",
    "qr_code",
    "advanced",
    "debug",
] }
tokio = { version = "*" }
async_channel_io = "0.3.0"
