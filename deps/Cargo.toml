[package]
name = "deps"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["dylib"]

[profile.dev]
opt-level = 1
codegen-units = 1

[profile.dev.package."*"]
opt-level = 3
codegen-units = 1


[dependencies]
serde = { version = "*", features = ["derive"] }
no-mangle-if-debug = "0.1.0"
once_cell = "1.21.3"
bincode = { version = "1.3.3" }
tokio = { version = "*" }
async_channel_io = "0.3.0"
iced = { workspace = true, features = [
    "wgpu",
    "tokio",
    "image",
    "qr_code",
    "advanced",
    "debug",
] }
